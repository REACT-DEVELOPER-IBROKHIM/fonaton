<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20">
  <!-- Blue background -->
  <rect width="30" height="20" fill="#012169"/>
  <!-- St Andrew's cross – white diagonals -->
  <path d="M0,0 L30,20 M30,0 L0,20" stroke="#fff" stroke-width="5"/>
  <!-- St Patrick's cross – red offset diagonals (counterchanged) -->
  <path d="M0,1.7 L13,10 M17,10 L30,18.3" stroke="#C8102E" stroke-width="3"/>
  <path d="M30,1.7 L17,10 M13,10 L0,18.3" stroke="#C8102E" stroke-width="3"/>
  <!-- St George's cross – white bars -->
  <rect x="12" y="0" width="6" height="20" fill="#fff"/>
  <rect x="0" y="7" width="30" height="6" fill="#fff"/>
  <!-- St George's cross – red bars -->
  <rect x="13" y="0" width="4" height="20" fill="#C8102E"/>
  <rect x="0" y="8" width="30" height="4" fill="#C8102E"/>
</svg>
