<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 30">
  <!-- Blue top stripe -->
  <rect width="45" height="10" fill="#009FCA"/>
  <!-- White separator top -->
  <rect y="10" width="45" height="1" fill="#fff"/>
  <!-- White middle stripe -->
  <rect y="11" width="45" height="8" fill="#fff"/>
  <!-- White separator bottom -->
  <rect y="19" width="45" height="1" fill="#fff"/>
  <!-- Green bottom stripe -->
  <rect y="20" width="45" height="10" fill="#1EB53A"/>
  <!-- Crescent moon (white outer, blue cutout) -->
  <circle cx="7.5" cy="5" r="3.4" fill="#fff"/>
  <circle cx="9.2" cy="4.4" r="2.9" fill="#009FCA"/>
  <!-- 12 stars in arc (rows of 5, 5, 2) -->
  <circle cx="15" cy="2.2" r="0.65" fill="#fff"/>
  <circle cx="18" cy="1.4" r="0.65" fill="#fff"/>
  <circle cx="21" cy="1.1" r="0.65" fill="#fff"/>
  <circle cx="24" cy="1.4" r="0.65" fill="#fff"/>
  <circle cx="27" cy="2.2" r="0.65" fill="#fff"/>
  <circle cx="15" cy="4.8" r="0.65" fill="#fff"/>
  <circle cx="18" cy="4.0" r="0.65" fill="#fff"/>
  <circle cx="21" cy="3.7" r="0.65" fill="#fff"/>
  <circle cx="24" cy="4.0" r="0.65" fill="#fff"/>
  <circle cx="27" cy="4.8" r="0.65" fill="#fff"/>
  <circle cx="18" cy="7.0" r="0.65" fill="#fff"/>
  <circle cx="21" cy="6.5" r="0.65" fill="#fff"/>
</svg>
